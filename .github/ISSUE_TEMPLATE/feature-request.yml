name: Feature request
description: Suggest a workflow improvement or new Viandly capability.
title: "[Feature]: "
labels:
  - enhancement
  - "status: needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        Describe the cooking or recipe-management problem first. That context helps us evaluate more than one possible solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Explain what you are trying to accomplish and what makes it difficult today.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Suggested experience
      description: Describe how you imagine the workflow operating in Viandly.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Current workaround
      description: How do you handle this today, if at all?

  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Recipe library and organization
        - Recipe entry and editing
        - Import and OCR
        - AI assistance
        - Cooking Mode
        - Shopping lists
        - Cookbooks
        - Sharing and public profiles
        - Account and settings
        - Other
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have not included private recipes, share links, credentials, or personal information.
          required: true
